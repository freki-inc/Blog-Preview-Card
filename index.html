<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
    <link rel="stylesheet" href="style.css">
    <title>Frontend Mentor | Blog preview card</title>
  </head>
  <body>
    <div class="preview-card-container">
      <div class="blog-img-container">
        <img class="blog-img" src="./assets/images/illustration-article.svg" alt="abstract illustration" width="279px" height="200px">
      </div>
      <div class="content-container">
        <div class="category-container">
          <p class="category-title">Learning</p>
        </div>
        <p class="publish-date">Published 21 Dec 2023</p>
        <h1 class="title">
          HTML & CSS foundations
        </h1>
        <p class="description">These languages are the backbone of every website, defining structure, content, and presentation.</p>
      </div>
      <div class="author-container">
        <img class="user-img" src="./assets/images/image-avatar.webp" alt="user image" width="32px" height="32px">
        <p class="user-name">Greg Hooper</p>
      </div>
    </div>
    
    <div class="attribution">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
      Coded by <a href="https://www.willemwebdev.com/">Willem Freeke</a>.
    </div>
  </body>
</html>
